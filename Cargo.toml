[package]
name = "hunch"
version = "1.0.0"
edition = "2024"
authors = ["Lijun Zhu"]
description = "A Rust port of guessit — extract media metadata from filenames"
license = "MIT"
repository = "https://github.com/lijunzh/hunch"
homepage = "https://github.com/lijunzh/hunch"
keywords = ["media", "parser", "filename", "movies", "episodes"]
categories = ["multimedia", "parser-implementations"]
readme = "README.md"

[dependencies]
regex = "1"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
clap = { version = "4", features = ["derive"] }
toml = "0.8"

[dev-dependencies]
pretty_assertions = "1"
criterion = { version = "0.5", features = ["html_reports"] }

[[bench]]
name = "parse"
harness = false

[[bin]]
name = "hunch"
path = "src/main.rs"

[lib]
name = "hunch"
path = "src/lib.rs"

[package.metadata.binstall]
pkg-url = "{ repo }/releases/download/v{ version }/hunch-{ target }.tar.gz"
pkg-fmt = "tgz"
bin-dir = "hunch-{ target }/{ bin }{ binary-ext }"
