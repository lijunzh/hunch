[package]
name = "hunch"
version = "0.1.0"
edition = "2024"
description = "A media filename parser for Rust — spiritual descendant of guessit"
license = "MIT"
keywords = ["media", "parser", "filename", "movies", "episodes"]
categories = ["multimedia", "parser-implementations"]
readme = "README.md"

[dependencies]
regex = "1"
fancy-regex = "0.14"
lazy_static = "1"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
clap = { version = "4", features = ["derive"] }

[dev-dependencies]
pretty_assertions = "1"

[[bin]]
name = "hunch"
path = "src/main.rs"

[lib]
name = "hunch"
path = "src/lib.rs"
