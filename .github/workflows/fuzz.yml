name: Fuzzing

# PR-time fuzz harness build (~30s) confirms the fuzz targets still
# compile against current main. Catches API drift that would silently
# rot the harness without paying for actual fuzzing time on every PR.
#
# Real fuzzing happens off-CI (local + future OSS-Fuzz integration).
# A nightly in-CI fuzz run would accumulate crash artifacts that nobody
# triages on a hobby-scale crate; deleted in the CI simplification sweep.

on:
  pull_request:
    paths:
      - 'fuzz/**'
      - 'src/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - '.github/workflows/fuzz.yml'
  workflow_dispatch:

concurrency:
  group: fuzz-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Fuzz harness build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
      # cargo-fuzz needs nightly + an explicit gnu target; otherwise
      # ubuntu-latest auto-picks musl and the sanitizer can't link.
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8  # stable
        with:
          toolchain: nightly
          targets: x86_64-unknown-linux-gnu
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32  # v2
        with:
          key: fuzz-build
          workspaces: fuzz
      - uses: taiki-e/install-action@58e862542551f667fa44c8a2a4a1d64ad477c96a  # v2
        with:
          tool: cargo-fuzz
      - run: cargo +nightly fuzz build --target x86_64-unknown-linux-gnu
        working-directory: fuzz
