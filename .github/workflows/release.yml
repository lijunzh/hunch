name: Release

on:
  push:
    tags: ["v*"]

env:
  CARGO_TERM_COLOR: always

jobs:
  # Gate: verify this commit already passed CI on main.
  # A 2-second API call instead of re-running the full test suite.
  verify-ci:
    name: Verify CI passed
    runs-on: ubuntu-latest
    steps:
      - name: Check commit CI status
        run: |
          echo "Checking CI status for ${{ github.sha }}..."

          # GitHub Actions reports via the check-runs API
          RESULT=$(gh api repos/${{ github.repository }}/commits/${{ github.sha }}/check-suites \
            --jq '[
              .check_suites[]
              | select(.app.slug == "github-actions" and .head_branch == "main")
            ] | if length == 0 then "none"
                elif all(.conclusion == "success") then "success"
                elif any(.conclusion == "failure") then "failure"
                else "pending" end')

          echo "CI result: $RESULT"

          case "$RESULT" in
            success)
              echo "✅ CI passed — proceeding with release build"
              ;;
            pending|none)
              echo "❌ CI hasn't completed yet for this commit."
              echo "Wait for CI to pass on main before tagging."
              echo ""
              echo "Quick fix: wait a minute, delete the tag, and re-push:"
              echo "  git tag -d v... && git push origin :refs/tags/v..."
              echo "  # wait for CI to pass"
              echo "  git tag -a v... -m '...' && git push --tags"
              exit 1
              ;;
            *)
              echo "❌ CI failed for this commit (result: $RESULT)"
              echo "Fix CI on main before tagging a release."
              exit 1
              ;;
          esac
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build:
    name: Build ${{ matrix.target }}
    needs: verify-ci
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-pc-windows-msvc
            os: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> $GITHUB_ENV

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package (unix)
        if: runner.os != 'Windows'
        run: |
          mkdir hunch-${{ matrix.target }}
          cp target/${{ matrix.target }}/release/hunch hunch-${{ matrix.target }}/
          cp README.md LICENSE hunch-${{ matrix.target }}/
          tar czf hunch-${{ matrix.target }}.tar.gz hunch-${{ matrix.target }}

      - name: Package (windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          mkdir hunch-${{ matrix.target }}
          cp target/${{ matrix.target }}/release/hunch.exe hunch-${{ matrix.target }}/
          cp README.md LICENSE hunch-${{ matrix.target }}/
          tar czf hunch-${{ matrix.target }}.tar.gz hunch-${{ matrix.target }}

      - uses: actions/upload-artifact@v4
        with:
          name: hunch-${{ matrix.target }}
          path: hunch-${{ matrix.target }}.tar.gz

  publish:
    name: Publish to crates.io
    needs: build
    runs-on: ubuntu-latest
    environment: crates-io
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo publish
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  github-release:
    name: GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Extract release notes
        id: notes
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          if [ -f RELEASE_NOTES.md ] && [ -s RELEASE_NOTES.md ]; then
            cp RELEASE_NOTES.md release_notes.md
            echo "generate=false" >> $GITHUB_OUTPUT
          else
            awk "/^## \\[${TAG}\\]/{found=1; next} /^## \\[/{if(found) exit} found" CHANGELOG.md > release_notes.md
            if [ ! -s release_notes.md ]; then
              echo "generate=true" >> $GITHUB_OUTPUT
            else
              echo "generate=false" >> $GITHUB_OUTPUT
            fi
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: ${{ steps.notes.outputs.generate == 'true' }}
          body_path: ${{ steps.notes.outputs.generate != 'true' && 'release_notes.md' || '' }}
          files: artifacts/*.tar.gz
