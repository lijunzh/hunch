name: Benchmarks

# Weekly perf snapshot via the existing criterion harness in benches/.
#
# Why so simple: per-PR bench gating on shared GitHub runners has a
# ~5-10% noise floor that produced more false positives than real
# signal. We now snapshot weekly + on-demand, upload an artifact, and
# leave perf-regression triage to humans reading the trend.
#
# Methodology + baseline numbers: docs/src/reference/benchmarks.md

on:
  schedule:
    - cron: "14 5 * * 0"  # Sunday 05:14 UTC
  workflow_dispatch:

concurrency:
  group: benchmark-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  bench:
    name: cargo bench
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8  # stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32  # v2
        with:
          key: bench

      - name: Run benches (bencher format)
        run: |
          mkdir -p bench-output
          cargo bench --bench parse -- --output-format bencher --noplot \
            2>&1 | tee bench-output/parse.txt
          grep '^test ' bench-output/parse.txt > bench-output/parse-summary.txt || true
          echo ""
          echo "=== Summary ==="
          cat bench-output/parse-summary.txt

      - name: Upload bench results
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7
        with:
          name: bench-results-${{ github.sha }}
          path: bench-output/
          if-no-files-found: error
          retention-days: 90
